<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INSANE Sound Visualizer</title>
<link rel="stylesheet" href="style.css">

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.15/paper-full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>

<body>
    <!-- Overlay -->
    <div class="overlay">
        <h1>FEEL THE BEAAAAT</h1>
        <p>Click or Press Any Key</p>
    </div>

    <!-- Alphabet Grid -->
    <div class="alphabet-grid">
        <span>A</span><span>S</span><span>D</span><span>F</span><span>G</span>
        <span>H</span><span>J</span><span>K</span><span>L</span>
        <span>Q</span><span>W</span><span>E</span><span>R</span><span>T</span>
        <span>Y</span><span>U</span><span>I</span><span>O</span><span>P</span>
        <span>Z</span><span>X</span><span>C</span><span>V</span><span>B</span>
        <span>N</span><span>M</span>
    </div>

    <!-- Canvas -->
    <canvas id="myCanvas" resize></canvas>

    <!-- Footer -->
    <footer>
        <p>@ feel the music</p>
    </footer>

<script src="script.js"></script>
</body>
</html>
